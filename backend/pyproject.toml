[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "W", "C90"]
ignore = []
exclude = [
    "**/migrations/*.py",
    "venv/",
    ".git/",
    "__pycache__/",
    "build/",
    "dist/"
]

[tool.black]
line-length = 100
target-version = ['py312']
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | **/migrations
)/
'''
